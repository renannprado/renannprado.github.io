theme = "coder"
languageCode = "en-us"
defaultcontentlanguage = "en"
enableEmoji = true

title = "Renann's Blog"

paginate = 20 # Default number of pages per page in pagination.
canonifyurls = true # Enable to turn relative URLs into absolute.

pygmentsstyle = "b2" # Color-theme or style for syntax highlighting.
pygmentscodefences = true # Enable code fence background highlighting.
pygmentscodefencesguesssyntax = true # Enable syntax guessing for code fences without specified language.

# integrations
googleAnalytics = "UA-15036200-3"
disqusShortname = "renanns-blog"

[params] # theme parameters
    author = "Renann Prado" # Author's name.
    info = "Senior Software Engineer" # Author's job title or info.
    description = "Renann's personal blog" # Site description.
    keywords = "blog,developer,personal" # Site keywords.
    avatarurl = "https://avatars3.githubusercontent.com/u/2359543?s=460&v=4" # Contain the path of the optionnal avatar in the static folder.

    # footercontent = "Enter a text here." # Add footer content

    # Whether you want to hide copyright and credits in the footer.
    hideCredits = false
    hideCopyright = false

    # to switch bewteen LTR and RTL layout
    rtl = false

# Social links
[[params.social]]
    name = "Github"
    icon = "fab fa-github fa-2x"
    weight = 1
    url = "https://github.com/renannprado/"

[[params.social]]
    name = "Linkedin"
    icon = "fab fa-linkedin fa-2x"
    weight = 2
    url = "https://www.linkedin.com/in/renannprado/?locale=en_US"

# Menu links
[[menu.main]]
    name = "Blog"
    weight = 1
    url  = "/posts/"
[[menu.main]]
    name = "About"
    weight = 2
    url = "/posts/whoami/"
